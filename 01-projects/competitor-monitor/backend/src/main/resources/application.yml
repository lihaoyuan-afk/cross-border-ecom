server:
  port: 8080

spring:
  datasource:
    # 请将 your_password 替换为你的 MySQL 密码
    url: jdbc:mysql://localhost:3306/competitor_monitor?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ${DB_PASSWORD:lihaoyuan123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 关闭 Spring Boot 自动检测 JPA，只用 MyBatis-Plus
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

mybatis-plus:
  configuration:
    # 开启驼峰命名转换（数据库 snake_case → Java camelCase）
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.ecom.monitor: debug
    com.baomidou.mybatisplus: warn
